<style>
  :root { --bg:#f4f5f7; --card:#fff; --ink:#1f2933; --muted:#6b7280;
          --navy:#13294b; --gold:#c9a227; --gold-soft:#e6c869;
          --brand:#13294b; --ok:#059669; --warn:#dc2626; --line:#e5e7eb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background:var(--bg); color:var(--ink); }
  header { background:var(--navy); color:#fff; padding:14px 18px; border-bottom:3px solid var(--gold); }
  header h1 { margin:0; font-size:18px; font-weight:600; }
  header p { margin:2px 0 0; font-size:12px; opacity:.85; }
  #barras { position:sticky; top:0; z-index:5; }
  nav#grupos { display:flex; gap:2px; overflow-x:auto; background:var(--navy); padding:0 8px; }
  nav#grupos button { border:0; background:none; padding:14px 16px; font-size:14px; color:rgba(255,255,255,.72);
               border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; }
  nav#grupos button:hover { color:#fff; }
  nav#grupos button.ativo { color:var(--gold-soft); border-bottom-color:var(--gold); font-weight:600; }
  #subnav { display:none; gap:8px; overflow-x:auto; background:#fff; border-bottom:1px solid var(--line);
            padding:9px 12px; }
  #subnav.mostrar { display:flex; }
  .subgrupo { display:none; gap:8px; }
  .subgrupo.ativa { display:flex; }
  .subgrupo button { border:1px solid var(--line); background:#fff; color:var(--muted); padding:7px 14px;
                     border-radius:999px; cursor:pointer; font-size:13px; white-space:nowrap; }
  .subgrupo button:hover { border-color:var(--navy); color:var(--navy); }
  .subgrupo button.ativo { background:var(--navy); color:#fff; border-color:var(--navy); font-weight:600; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  .aba { display:none; }
  .aba.ativa { display:block; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;
          box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .card .rotulo { font-size:12px; color:var(--muted); }
  .card .valor { font-size:24px; font-weight:700; margin-top:4px; }
  h2 { font-size:15px; margin:22px 0 10px; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line);
          border-radius:12px; overflow:hidden; font-size:13px; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); }
  th { background:#fafafa; color:var(--muted); font-weight:600; }
  tr:last-child td { border-bottom:0; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
  .pill.baixo { background:#fee2e2; color:var(--warn); }
  .vazio { color:var(--muted); font-size:13px; padding:10px 0; }
  .em-breve { color:var(--muted); font-size:14px; padding:30px 0; text-align:center; }
  .carregando { color:var(--muted); font-size:13px; }
  .toggle { display:flex; gap:6px; margin-bottom:14px; }
  .toggle button { flex:1; padding:10px; border:1px solid var(--line); background:#fff; color:var(--muted);
                   border-radius:10px; cursor:pointer; font-size:14px; }
  .toggle button.ativo { background:var(--brand); color:#fff; border-color:var(--brand); font-weight:600; }
  .form { display:flex; flex-direction:column; gap:12px; max-width:520px; }
  .form label { display:flex; flex-direction:column; gap:4px; font-size:13px; color:var(--muted); }
  .form select, .form input, .form textarea { padding:10px; border:1px solid var(--line); border-radius:10px;
                              font-size:15px; color:var(--ink); background:#fff; font-family:inherit; }
  .form textarea { resize:vertical; }
  .lin2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .acoes { display:flex; gap:10px; margin-top:4px; }
  .acoes button { padding:12px 16px; border-radius:10px; border:0; font-size:15px; cursor:pointer; }
  .primario { background:var(--brand); color:#fff; font-weight:600; flex:1; }
  .secundario { background:#eef2ff; color:var(--brand); }
  .acoes button:disabled { opacity:.6; cursor:default; }
  .preview { background:#f8fafc; border:1px solid var(--line); border-radius:10px; padding:12px;
             font-size:14px; white-space:pre-line; display:none; }
  .preview.mostrar { display:block; }
  .msg { margin-top:14px; font-size:14px; padding:10px 12px; border-radius:10px; display:none; }
  .msg.ok { display:block; background:#dcfce7; color:#166534; }
  .msg.erro { display:block; background:#fee2e2; color:var(--warn); }
  .periodos { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .periodos button { padding:8px 14px; border:1px solid var(--line); background:#fff; color:var(--muted);
                     border-radius:999px; cursor:pointer; font-size:13px; }
  .periodos button.ativo { background:var(--brand); color:#fff; border-color:var(--brand); font-weight:600; }
  .grafico { background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; min-height:220px; }
  .rel-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:680px){ .rel-grid2 { grid-template-columns:1fr; } }
  .veredito { font-size:18px; font-weight:700; padding:14px 16px; border-radius:12px; margin:16px 0 12px; }
  .veredito.ok { background:#dcfce7; color:#166534; }
  .veredito.nao { background:#fee2e2; color:var(--warn); }
  #s-resultado th { width:46%; }
  .modo { display:none; }
  .modo.ativo { display:block; }
  .form label.check { flex-direction:row; align-items:center; gap:8px; color:var(--ink); }
  .form label.check input { width:auto; }
  .estoque-varas { border:1px solid var(--line); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:10px; }
  .estoque-varas .ev-titulo { font-size:13px; color:var(--muted); }
  .estoque-varas .ev-preview { font-size:13px; font-weight:600; color:var(--brand); }
  .dica { color:var(--muted); font-size:13px; margin:0 0 12px; }
  .fin-filtros { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
  .fin-filtros label { display:flex; flex-direction:column; gap:4px; font-size:13px; color:var(--muted); }
  .fin-filtros select { padding:9px 10px; border:1px solid var(--line); border-radius:10px;
                        font-size:14px; background:#fff; color:var(--ink); }
  #tela-login { display:none; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  body:not(.logado) #tela-login { display:flex; }
  body:not(.logado) #app-conteudo { display:none; }
  .login-box { background:var(--card); border:1px solid var(--line); border-radius:16px;
               padding:28px 24px; max-width:360px; width:100%; box-shadow:0 4px 20px rgba(0,0,0,.06); }
  .login-box h1 { color:var(--brand); font-size:20px; margin:0 0 4px; }
  .login-sub { color:var(--muted); font-size:13px; margin:0 0 18px; }
  header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  #btn-sair { background:rgba(255,255,255,.2); color:#fff; border:0; padding:8px 14px;
              border-radius:8px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .card .delta { font-size:12px; margin-top:6px; font-weight:600; }
  .card .delta.bom { color:var(--ok); }
  .card .delta.ruim { color:var(--warn); }
  .card .delta.igual { color:var(--muted); }
  .insights-box ul.insights { margin:12px 0 18px; padding-left:18px; }
  .insights-box ul.insights li { font-size:14px; color:var(--ink); margin:6px 0; }
  .lanc-ent { color:var(--ok); font-weight:600; }
  .lanc-sai { color:var(--warn); font-weight:600; }
  /* esconder por atributo, à prova do .form{display:flex} */
  [hidden] { display:none !important; }
  /* ordens da oficina */
  .of-item { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;
             margin-bottom:10px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .of-cab { display:flex; align-items:center; gap:8px; justify-content:space-between; }
  .of-cab strong { font-size:15px; }
  .of-id { font-size:11px; color:#fff; background:var(--navy); padding:2px 8px; border-radius:999px; }
  .of-desc { font-size:13px; color:var(--ink); margin:6px 0; white-space:pre-line; }
  .of-meta { font-size:12px; color:var(--muted); margin:4px 0; }
  .of-aviso { font-size:12px; margin:6px 0 10px; }
  .of-btn { margin-top:4px; padding:9px 14px; border-radius:10px; border:0; cursor:pointer;
            background:var(--navy); color:#fff; font-weight:600; font-size:14px; }
  .of-btn:disabled { opacity:.6; cursor:default; }
</style>
